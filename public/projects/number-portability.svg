<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Number portability system preview placeholder">
  <defs>
    <linearGradient id="gnp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001f54"/>
      <stop offset="1" stop-color="#034078"/>
    </linearGradient>
    <radialGradient id="gnpGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0" stop-color="#1282a2" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#1282a2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#gnp)"/>
  <rect width="800" height="450" fill="url(#gnpGlow)"/>

  <!-- two network operators -->
  <g fill="none" stroke="#c8dcf0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- left tower -->
    <g transform="translate(190 150)" stroke-opacity="0.85">
      <path d="M0 24 -18 96 18 96 0 24z"/>
      <path d="M-12 6a18 18 0 0 1 24 0M-22 -4a32 32 0 0 1 44 0" stroke="#1282a2"/>
      <circle cx="0" cy="20" r="4" fill="#1282a2" stroke="none"/>
    </g>
    <!-- right tower -->
    <g transform="translate(610 150)" stroke-opacity="0.85">
      <path d="M0 24 -18 96 18 96 0 24z"/>
      <path d="M-12 6a18 18 0 0 1 24 0M-22 -4a32 32 0 0 1 44 0" stroke="#1282a2"/>
      <circle cx="0" cy="20" r="4" fill="#1282a2" stroke="none"/>
    </g>
  </g>

  <!-- ported number badge in the middle -->
  <g transform="translate(400 200)">
    <rect x="-92" y="-30" width="184" height="60" rx="30" fill="#0a1c3a" stroke="#1282a2" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Inter,monospace" font-size="26" fill="#c8dcf0" font-weight="700" letter-spacing="2">+1 758…</text>
  </g>

  <!-- transfer arrows between towers, through the number -->
  <g fill="none" stroke="#1282a2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 175 H300" stroke-opacity="0.8"/>
    <path d="M295 167 L305 175 295 183" stroke-opacity="0.8"/>
    <path d="M550 225 H500" stroke-opacity="0.8"/>
    <path d="M505 217 L495 225 505 233" stroke-opacity="0.8"/>
  </g>

  <text x="400" y="362" text-anchor="middle" font-family="Inter,sans-serif" font-size="30" fill="#ffffff" font-weight="800">Number Portability</text>
  <text x="400" y="392" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#8fb3d9">Mobile &amp; fixed-line · ECTEL &amp; Ukraine</text>
</svg>
