<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="miRadio voice application preview placeholder">
  <defs>
    <linearGradient id="gm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001f54"/>
      <stop offset="1" stop-color="#034078"/>
    </linearGradient>
    <radialGradient id="gmGlow" cx="50%" cy="42%" r="40%">
      <stop offset="0" stop-color="#1282a2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1282a2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#gm)"/>
  <rect width="800" height="450" fill="url(#gmGlow)"/>

  <!-- concentric voice / broadcast rings -->
  <g fill="none" stroke="#c8dcf0" stroke-linecap="round">
    <circle cx="400" cy="190" r="58" stroke-opacity="0.30" stroke-width="2"/>
    <circle cx="400" cy="190" r="92" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="400" cy="190" r="128" stroke-opacity="0.10" stroke-width="2"/>
  </g>

  <!-- microphone -->
  <g transform="translate(400 190)" fill="none" stroke="#1282a2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-16" y="-44" width="32" height="56" rx="16" fill="#1282a2" stroke="none"/>
    <path d="M-28 -6a28 28 0 0 0 56 0"/>
    <path d="M0 22v16M-14 38h28"/>
  </g>

  <!-- animated-looking waveform -->
  <g stroke="#c8dcf0" stroke-width="5" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="250" y1="190" x2="250" y2="190"/>
    <line x1="278" y1="172" x2="278" y2="208"/>
    <line x1="306" y1="156" x2="306" y2="224"/>
    <line x1="494" y1="156" x2="494" y2="224"/>
    <line x1="522" y1="172" x2="522" y2="208"/>
    <line x1="550" y1="182" x2="550" y2="198"/>
  </g>

  <text x="400" y="370" text-anchor="middle" font-family="Inter,sans-serif" font-size="34" fill="#ffffff" font-weight="800">miRadio</text>
  <text x="400" y="402" text-anchor="middle" font-family="Inter,sans-serif" font-size="17" fill="#8fb3d9">Voice-activated on-demand radio · Alexa &amp; Google Assistant</text>
</svg>
